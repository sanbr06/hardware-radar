name: Radar Hardware

on:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: baixar repo
        uses: actions/checkout@v3

      - name: instalar python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: instalar bibliotecas
        run: pip install requests beautifulsoup4

      - name: executar radar
        run: python radar.py

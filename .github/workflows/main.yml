name: Radar Hardware

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Executar radar
        run: python radar.py
